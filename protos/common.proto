syntax = "proto3";

import "error.proto";

package common;

// EasyTier 通用配置项，供 PeerInfo / 配置同步等场景复用。
message FlagsInConfig {
  string default_protocol = 1;
  string dev_name = 2;
  bool enable_encryption = 3;
  bool enable_ipv6 = 4;
  uint32 mtu = 5;
  bool latency_first = 6;
  bool enable_exit_node = 7;
  bool no_tun = 8;
  bool use_smoltcp = 9;
  string relay_network_whitelist = 10;
  bool disable_p2p = 11;
  bool relay_all_peer_rpc = 12;
  bool disable_udp_hole_punching = 13;
  // string ipv6_listener = 14; [deprecated = true]; 改为使用 -l udp://[::]:12345
  bool multi_thread = 15;
  CompressionAlgoPb data_compress_algo = 16;
  bool bind_device = 17;

  // 是否把 TCP 流统一转成 KCP 流处理
  bool enable_kcp_proxy = 18;
  // 当前 Peer 是否允许接收 KCP 输入
  bool disable_kcp_input = 19;
  // 是否禁止中继本网络内的 KCP 数据
  bool disable_relay_kcp = 20;
  bool proxy_forward_by_system = 21;

  // 是否启用 Magic DNS
  bool accept_dns = 22;
  // 是否启用私有模式
  bool private_mode = 23;

  // 是否把 TCP 流统一转成 QUIC 流处理
  bool enable_quic_proxy = 24;
  // 当前 Peer 是否允许接收 QUIC 输入
  bool disable_quic_input = 25;
  // QUIC 监听端口
  uint32 quic_listen_port = 33;

  // 全局中继带宽限制，仅对 foreign network 生效
  uint64 foreign_relay_bps_limit = 26;

  uint32 multi_thread_count = 27;

  // 是否允许中继 foreign network 的 KCP 数据
  bool enable_relay_foreign_network_kcp = 28;

  // 使用的加密算法；空字符串表示默认值（aes-gcm）
  string encryption_algorithm = 29;

  // 是否关闭对称 NAT 打洞；开启后会把 symmetric 按 cone 路径处理
  bool disable_sym_hole_punching = 30;

  // Magic DNS 使用的顶级域后缀
  string tld_dns_zone = 31;
}

message RpcDescriptor {
  // 允许同一个 service 在不同 domain 下重复注册
  string domain_name = 1;

  string proto_name = 2;
  string service_name = 3;
  uint32 method_index = 4;
}

message RpcRequest {
  RpcDescriptor descriptor = 1 [ deprecated = true ];

  bytes request = 2;
  int32 timeout_ms = 3;
}

message RpcResponse {
  bytes response = 1;
  error.Error error = 2;

  uint64 runtime_us = 3;
}

enum CompressionAlgoPb {
  Invalid = 0;
  None = 1;
  Zstd = 2;
}

message RpcCompressionInfo {
  // 当前包体实际使用的压缩算法
  CompressionAlgoPb algo = 1;

  // 告诉对端下一次请求或响应希望使用哪种压缩算法
  CompressionAlgoPb accepted_algo = 2;
}

message RpcPacket {
  uint32 from_peer = 1;
  uint32 to_peer = 2;
  int64 transaction_id = 3;

  RpcDescriptor descriptor = 4;
  bytes body = 5;
  bool is_request = 6;

  uint32 total_pieces = 7;
  uint32 piece_idx = 8;

  int32 trace_id = 9;

  RpcCompressionInfo compression_info = 10;
}

message Void {}

message UUID {
  uint32 part1 = 1;
  uint32 part2 = 2;
  uint32 part3 = 3;
  uint32 part4 = 4;
}

enum NatType {
  // 存在 NAT，但拥有单独公网 IP，且端口不会被改写
  Unknown = 0;
  OpenInternet = 1;
  NoPAT = 2;
  FullCone = 3;
  Restricted = 4;
  PortRestricted = 5;
  Symmetric = 6;
  SymUdpFirewall = 7;
  SymmetricEasyInc = 8;
  SymmetricEasyDec = 9;
}

message Ipv4Addr { uint32 addr = 1; }

message Ipv6Addr {
  uint32 part1 = 1;
  uint32 part2 = 2;
  uint32 part3 = 3;
  uint32 part4 = 4;
}

message IpAddr {
  oneof ip {
    Ipv4Addr ipv4 = 1;
    Ipv6Addr ipv6 = 2;
  };
}

message Ipv4Inet {
  Ipv4Addr address = 1;
  uint32 network_length = 2;
}

message Ipv6Inet {
  Ipv6Addr address = 1;
  uint32 network_length = 2;
}

message IpInet {
  oneof ip {
    Ipv4Inet ipv4 = 1;
    Ipv6Inet ipv6 = 2;
  };
}

message Url { string url = 1; }

message SocketAddr {
  oneof ip {
    Ipv4Addr ipv4 = 1;
    Ipv6Addr ipv6 = 2;
  };
  uint32 port = 3;
}

message TunnelInfo {
  string tunnel_type = 1;
  common.Url local_addr = 2;
  common.Url remote_addr = 3;
}

message StunInfo {
  NatType udp_nat_type = 1;
  NatType tcp_nat_type = 2;
  int64 last_update_time = 3;
  repeated string public_ip = 4;
  uint32 min_port = 5;
  uint32 max_port = 6;
}

message PeerFeatureFlag {
  bool is_public_server = 1;
  bool avoid_relay_data = 2;
  bool kcp_input = 3;
  bool no_relay_kcp = 4;
}

enum SocketType {
  TCP = 0;
  UDP = 1;
}

message PortForwardConfigPb {
  SocketAddr bind_addr = 1;
  SocketAddr dst_addr = 2;
  SocketType socket_type = 3;
}

message ProxyDstInfo { SocketAddr dst_addr = 1; }

message LimiterConfig {
  optional uint64 burst_rate =
      1; // 默认值为 1，表示不额外突发，桶容量与 bps 一致
  optional uint64 bps = 2; // 默认值为 0，表示不限速，单位为 B/s
  optional uint64 fill_duration_ms =
      3; // 默认值为 10ms，表示令牌桶补充周期
}
